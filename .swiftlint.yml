# SwiftLint configuration for AIVibe (Swift 6)
# Обновлено: 2026-05-26 — приведено в соответствие с кодовой базой

disabled_rules:
  - line_length
  - trailing_whitespace
  - orphaned_doc_comment
  - todo                          # TODO/FIXME — рабочие маркеры, не ошибки
  - blanket_disable_command       # используем inline-disable для конкретных мест
  - for_where                     # не всегда улучшает читаемость (multi-param rectsOverlap)

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil
  - discouraged_optional_boolean
  - explicit_init
  - fatal_error_message
  - first_where
  - last_where
  - modifier_order
  - overridden_super_call
  - private_action
  - private_outlet
  - prohibited_super_call
  - sorted_first_last
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call

# Убраны из opt_in (слишком строгие для текущей кодовой базы):
#   - force_unwrapping            # 20+ мест, многие — guard let невозможен (static let)
#   - implicitly_unwrapped_optional  # стандартный паттерн в XCTest setUp
#   - discouraged_optional_collection  # допустимо для API-совместимости

excluded:
  - .build
  - Pods
  - Carthage
  - derived_data
  - Package.swift                 # SPM манифест — автогенерация, свои правила
  - AIVibeTests                   # Тесты — длинные setUp, циклы, моки; не production код

# ─── Пороги ──────────────────────────────────────────────────────

identifier_name:
  min_length:
    warning: 1
    error: 0
  allowed_symbols:
    - _
  excluded:
    - id
    - to

large_tuple:
  warning: 4
  error: 5

force_cast: warning
force_try: warning

type_body_length:
  warning: 500
  error: 700

file_length:
  warning: 1000
  error: 1500

function_body_length:
  warning: 80
  error: 150

function_parameter_count:
  warning: 7
  error: 9

cyclomatic_complexity:
  warning: 25
  error: 50

reporter: "xcode"

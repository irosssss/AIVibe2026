# SwiftLint configuration for AIVibe (Swift 6)
disabled_rules:
  - line_length
  - trailing_whitespace
  - orphaned_doc_comment

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil
  - discouraged_optional_boolean
  - discouraged_optional_collection
  - explicit_init
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - last_where
  - modifier_order
  - overridden_super_call
  - private_action
  - private_outlet
  - prohibited_super_call
  - sorted_first_last
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call

excluded:
  - .build
  - Pods
  - Carthage
  - derived_data

force_cast: warning
force_try: warning
type_body_length:
  - 300
  - 400
file_length:
  - 500
  - 1000
line_length:
  warning: 120
  error: 200
reporter: "xcode"

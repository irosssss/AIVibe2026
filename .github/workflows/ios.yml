name: iOS CI/CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  SCHEME: "AIVibe"

jobs:
  secrets-scan:
    name: Secrets Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  swiftlint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint --strict

  build:
    name: Build
    runs-on: macos-15
    needs: swiftlint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show environment
        run: |
          xcodebuild -version
          swift --version
          xcrun simctl list runtimes

      - name: Install iOS Simulator runtime
        run: |
          # На macos-15 runner iOS runtime может быть не установлен
          # Проверяем и устанавливаем при необходимости
          if ! xcrun simctl list runtimes | grep -q "iOS"; then
            echo "Installing iOS simulator runtime..."
            xcodebuild -downloadPlatform iOS
          else
            echo "iOS runtime already available"
          fi

      - name: Determine simulator destination
        run: |
          # Ищем доступный iPhone симулятор
          SIM_ID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(d['udid'])
                          sys.exit(0)
          " 2>/dev/null || true)

          if [ -n "$SIM_ID" ]; then
            echo "DESTINATION=platform=iOS Simulator,id=$SIM_ID" >> $GITHUB_ENV
            echo "Found simulator: $SIM_ID"
          else
            echo "DESTINATION=generic/platform=iOS Simulator" >> $GITHUB_ENV
            echo "No simulator found, using generic destination"
          fi

      - name: Cache SPM packages
        uses: actions/cache@v4
        id: spm-cache
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: |
          xcodebuild build \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -configuration Debug \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            -quiet

  test:
    name: Test
    runs-on: macos-15
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install iOS Simulator runtime
        run: |
          if ! xcrun simctl list runtimes | grep -q "iOS"; then
            xcodebuild -downloadPlatform iOS
          fi

      - name: Determine simulator destination
        run: |
          SIM_ID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(d['udid'])
                          sys.exit(0)
          " 2>/dev/null || true)

          if [ -n "$SIM_ID" ]; then
            echo "DESTINATION=platform=iOS Simulator,id=$SIM_ID" >> $GITHUB_ENV
          else
            echo "::warning::No iOS simulator available — skipping tests"
            echo "SKIP_TESTS=true" >> $GITHUB_ENV
          fi

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Run tests
        if: env.SKIP_TESTS != 'true'
        run: |
          xcodebuild test \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -configuration Debug \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            -quiet

name: iOS CI/CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  SCHEME: "AIVibe"

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint --strict

  build:
    name: Build
    runs-on: macos-15
    needs: swiftlint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Show Swift version
        run: swift --version

      - name: List available simulators
        run: xcrun simctl list devices available | head -30

      - name: Prepare iOS Simulator
        run: |
          # Берём первый доступный iPhone симулятор
          DEVICE_ID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(d['udid'])
                          sys.exit(0)
          # Если нет — создаём
          " 2>/dev/null || true)

          if [ -z "$DEVICE_ID" ]; then
            echo "No simulator found, creating one..."
            DEVICE_ID=$(xcrun simctl create "CI-iPhone" "com.apple.CoreSimulator.SimDeviceType.iPhone-16" 2>/dev/null || true)
          fi

          if [ -z "$DEVICE_ID" ]; then
            echo "::warning::No simulator available, building for generic platform"
            echo "DESTINATION=generic/platform=iOS Simulator" >> $GITHUB_ENV
          else
            DEVICE_NAME=$(xcrun simctl list devices -j | python3 -c "
            import json, sys
            data = json.load(sys.stdin)
            for runtime, devices in data['devices'].items():
                for d in devices:
                    if d['udid'] == '$DEVICE_ID':
                        # Extract OS version from runtime
                        parts = runtime.split('.')
                        ver = '.'.join(parts[-2:]) if len(parts) >= 2 else '18.0'
                        # More reliable: just use device ID
                        print(f\"platform=iOS Simulator,id={d['udid']}\")
                        sys.exit(0)
            print('generic/platform=iOS Simulator')
            ")
            echo "DESTINATION=$DEVICE_NAME" >> $GITHUB_ENV
          fi
          echo "Using destination: $DESTINATION"

      - name: Cache SPM packages
        uses: actions/cache@v4
        id: spm-cache
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: |
          xcodebuild build \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -configuration Debug \
            -quiet

  test:
    name: Test
    runs-on: macos-15
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Prepare iOS Simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(d['udid'])
                          sys.exit(0)
          " 2>/dev/null || true)

          if [ -z "$DEVICE_ID" ]; then
            DEVICE_ID=$(xcrun simctl create "CI-iPhone" "com.apple.CoreSimulator.SimDeviceType.iPhone-16" 2>/dev/null || true)
          fi

          if [ -z "$DEVICE_ID" ]; then
            echo "DESTINATION=generic/platform=iOS Simulator" >> $GITHUB_ENV
          else
            echo "DESTINATION=platform=iOS Simulator,id=$DEVICE_ID" >> $GITHUB_ENV
          fi

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Install xcpretty
        run: gem install xcpretty

      - name: Run tests
        run: |
          xcodebuild test \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -configuration Debug \
            -quiet \
            | xcpretty
